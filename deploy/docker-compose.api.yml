services:
  api:
    image: ghcr.io/${GHCR_REPOSITORY}/api:${IMAGE_TAG:-latest}
    container_name: wevlo-api
    command: ["node", "dist/main.js"]
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "4000:4000"
    volumes:
      - /opt/wevlo/data/attachments:/opt/wevlo/data/attachments
