name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-api.yml"
      - "apps/api/**"
      - "packages/**"
      - "deploy/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: deploy-api-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.publish-image.outputs.image_ref }}
      image_tag: ${{ steps.publish-image.outputs.image_tag }}
      image_digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API workspace
        run: pnpm turbo run build --filter=@wevlo/api...

      - name: Run DB migrations (idempotency check)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEVLO_INTERNAL_AUTH_TOKEN: ${{ secrets.WEVLO_INTERNAL_AUTH_TOKEN }}
          ALLOW_DEV_AUTH: "false"
        run: |
          pnpm --filter @wevlo/data-access migrate
          pnpm --filter @wevlo/data-access migrate

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - id: publish-image
        name: Publish image metadata
        run: |
          echo "image_tag=ghcr.io/${{ github.repository }}/api:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${{ github.repository }}/api@${{ steps.build-image.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build
    runs-on: [self-hosted, macOS]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on Mac mini
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
        run: |
          set -eu
          mkdir -p /opt/wevlo/deploy
          cp deploy/docker-compose.api.yml /opt/wevlo/deploy/docker-compose.api.yml
          
          # apps/api/.env.production을 가져와서 배포 경로에 복사
          if [ -f apps/api/.env.production ]; then
            echo "Copying apps/api/.env.production to /opt/wevlo/deploy/.env.production"
            cp apps/api/.env.production /opt/wevlo/deploy/.env.production
          else
            echo "Warning: apps/api/.env.production not found in source. Checking existing target."
            if [ ! -f /opt/wevlo/deploy/.env.production ]; then
              echo "Error: .env.production is missing in both source and target."
              exit 1
            fi
          fi

          cd /opt/wevlo/deploy

          printf 'IMAGE_REF=%s\n' "${IMAGE_REF}" > .env.deploy

          docker compose --env-file .env.deploy -f docker-compose.api.yml config >/dev/null

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose --env-file .env.deploy -f docker-compose.api.yml pull api
          docker compose --env-file .env.deploy -f docker-compose.api.yml up -d api
          docker compose --env-file .env.deploy -f docker-compose.api.yml ps api

          healthy=0
          for attempt in 1 2 3 4 5 6; do
            if curl -fsS http://127.0.0.1:4000/health >/dev/null; then
              healthy=1
              break
            fi

            sleep 5
          done

          docker image prune -f

          if [ "${healthy}" -ne 1 ]; then
            docker compose --env-file .env.deploy -f docker-compose.api.yml logs --tail=100 api
            exit 1
          fi
