name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-api.yml"
      - "apps/api/**"
      - "packages/**"
      - "deploy/**"
      - "pnpm-lock.yaml"

concurrency:
  group: deploy-api-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run DB migrations (idempotency check)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WEVLO_INTERNAL_AUTH_TOKEN: ${{ secrets.WEVLO_INTERNAL_AUTH_TOKEN }}
          ALLOW_DEV_AUTH: "false"
        run: |
          pnpm --filter @wevlo/data-access migrate
          pnpm --filter @wevlo/data-access migrate

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}

  deploy:
    needs: build
    runs-on: [self-hosted, macOS]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on Mac mini
        env:
          GH_SHA: ${{ github.sha }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -eu
          mkdir -p /opt/wevlo/deploy
          cp deploy/docker-compose.api.yml /opt/wevlo/deploy/docker-compose.api.yml
          cd /opt/wevlo/deploy

          if [ ! -f .env.production ]; then
            echo "Missing /opt/wevlo/deploy/.env.production on Mac mini"
            exit 1
          fi

          if grep -q '^IMAGE_TAG=' .env.production; then
            sed -i.bak "s/^IMAGE_TAG=.*/IMAGE_TAG=${GH_SHA}/" .env.production
          else
            echo "IMAGE_TAG=${GH_SHA}" >> .env.production
          fi

          if grep -q '^GHCR_REPOSITORY=' .env.production; then
            sed -i.bak "s#^GHCR_REPOSITORY=.*#GHCR_REPOSITORY=${GH_REPO}#" .env.production
          else
            echo "GHCR_REPOSITORY=${GH_REPO}" >> .env.production
          fi

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose --env-file .env.production -f docker-compose.api.yml pull api
          docker compose --env-file .env.production -f docker-compose.api.yml up -d api
          docker image prune -f
